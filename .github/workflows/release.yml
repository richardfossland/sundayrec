# Build, sign, notarize, and publish SundayRec for macOS + Windows on a version
# tag. Mirrors the proven SundayEdit release flow.
#
# Cut a release:   npm version <patch|minor|major>   (bumps package.json)
#                  # bump src-tauri/tauri.conf.json "version" + Cargo.toml to match
#                  git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag push triggers this workflow, which builds on macOS (Apple Silicon) and
# Windows, signs + notarizes macOS, and creates a DRAFT GitHub Release with the
# installers. Review the draft, then publish it.
#
# ── STATUS (Phase 0 → Phase 9) ────────────────────────────────────────────────
# Signing is wired and ACTIVATES the moment the documented secrets exist
# (docs/DISTRIBUTION.md). Until then the build still runs but produces UNSIGNED
# installers (tauri-action skips signing when the secrets are absent).
#
# The auto-updater (`latest.json`) is intentionally OFF here — the updater
# plugin + signing keypair land in Phase 9 (see docs/MIGRATION-TAURI2.md). To
# turn it on then: install tauri-plugin-updater, add its pubkey to
# tauri.conf.json, add the TAURI_SIGNING_* secrets, and flip
# `includeUpdaterJson: true`. The env wiring is already in place below.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is Apple Silicon (arm64) — native build so the fetched
          # ffmpeg sidecar matches. Intel/universal is a follow-up (needs both
          # ffmpeg arches + a universal target).
          #
          # `--no-default-features --features editor` ships the recorder + editor
          # but NOT whisper transcription: whisper-rs-sys bundles a whisper.cpp
          # whose ggml fails to build on the M1 (arm64) GitHub runner — it emits
          # the i8mm intrinsic `vmmlaq_s32` while cmake detects i8mm as
          # unsupported on M1 ("always_inline ... requires target feature
          # 'i8mm'"). Transcription is an optional, hardware-unverified feature
          # and its commands degrade to a clear `feature_disabled` error, so it's
          # dropped from the installer until the whisper.cpp arm build is sorted.
          # The leading `--` forwards the rest to cargo (tauri-action runs
          # `tauri build <args>`, and tauri-cli only passes args after `--` on).
          # `tray` ships the menubar/tray icon (+ sundayrec:// deep-link). It
          # builds on both runners and degrades gracefully (install failure only
          # logs a warning), so it's safe to ship.
          - platform: macos-latest
            args: "-- --no-default-features --features editor,tray"
          - platform: windows-latest
            args: "-- --no-default-features --features editor,tray"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch bundled ffmpeg/ffprobe sidecars
        run: node scripts/fetch-ffmpeg.mjs

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing is intentionally NOT wired here yet: this is an UNSIGNED
          # prerelease. Even an *empty* APPLE_CERTIFICATE env makes tauri-action
          # run `security import` and fail ("failed to import keychain
          # certificate"), so the APPLE_* / TAURI_SIGNING_* vars are omitted
          # entirely. To enable signing later, add the secrets back here (see
          # docs/DISTRIBUTION.md) and flip includeUpdaterJson when the updater
          # keypair lands.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SundayRec ${{ github.ref_name }}"
          releaseBody: |
            SundayRec — recording for church services (Tauri 2 rebuild).

            See the assets below to download and install. If a build is
            unsigned (pre-signing), on first launch:
            - macOS: right-click the app ▸ Open ▸ Open.
            - Windows: "More info" ▸ "Run anyway".
          releaseDraft: true
          prerelease: true
          # Phase 9: flip to true once the updater plugin + keypair are in place.
          includeUpdaterJson: false
          args: ${{ matrix.args }}
