# Build, sign, notarize, and publish SundayRec for macOS + Windows on a version
# tag. Mirrors the proven SundayEdit release flow.
#
# Cut a release:   npm version <patch|minor|major>   (bumps package.json)
#                  # bump src-tauri/tauri.conf.json "version" + Cargo.toml to match
#                  git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag push triggers this workflow, which builds on macOS (Apple Silicon) and
# Windows, signs + notarizes macOS, and creates a DRAFT GitHub Release with the
# installers. Review the draft, then publish it.
#
# ── STATUS (Phase 0 → Phase 9) ────────────────────────────────────────────────
# Signing is wired and ACTIVATES the moment the documented secrets exist
# (docs/DISTRIBUTION.md). Until then the build still runs but produces UNSIGNED
# installers (tauri-action skips signing when the secrets are absent).
#
# The auto-updater (`latest.json`) is intentionally OFF here — the updater
# plugin + signing keypair land in Phase 9 (see docs/MIGRATION-TAURI2.md). To
# turn it on then: install tauri-plugin-updater, add its pubkey to
# tauri.conf.json, add the TAURI_SIGNING_* secrets, and flip
# `includeUpdaterJson: true`. The env wiring is already in place below.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is Apple Silicon (arm64) — native build so the fetched
          # ffmpeg sidecar matches. Intel/universal is a follow-up (needs both
          # ffmpeg arches + a universal target).
          #
          # macOS ships `whisper` (transcription) with the Metal GPU backend
          # (Cargo.toml's macOS target gives whisper-rs the `metal` feature) —
          # without it the installed app could neither download a model nor
          # transcribe (everything degraded to `feature_disabled`).
          # History: an earlier release hit a ggml i8mm-intrinsic compile error
          # (`vmmlaq_s32` vs "requires target feature 'i8mm'") on the M1 runner
          # and whisper was dropped. The crate builds cleanly on a local M1 Pro
          # (same arch as the runner), so it's re-enabled; if the runner's
          # toolchain still trips, drop `whisper` from this line only and fall
          # back to shipping whisper-cli as a sidecar (the Electron approach).
          # The leading `--` forwards the rest to cargo (tauri-action runs
          # `tauri build <args>`, and tauri-cli only passes args after `--` on).
          # `tray` ships the menubar/tray icon (+ sundayrec:// deep-link). It
          # builds on both runners and degrades gracefully (install failure only
          # logs a warning), so it's safe to ship.
          - platform: macos-latest
            args: "-- --no-default-features --features editor,tray,updater,whisper"
          # Windows adds `asio`: a low-latency, single-device multichannel audio
          # backend for pro interfaces (the dshow path splits them into stereo
          # pairs). It needs the Steinberg ASIO SDK + LLVM + MSVC at build time —
          # set up by the windows-only steps below (see docs/BUILD_ASIO.md). The
          # recorder falls back to WASAPI automatically when no ASIO driver exists.
          # `whisper` stays OFF here until the MSVC whisper.cpp build is verified
          # on a Windows runner (separate follow-up; CPU-only when it lands).
          - platform: windows-latest
            args: "-- --no-default-features --features editor,tray,asio,updater"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # ── Windows ASIO build prerequisites (see docs/BUILD_ASIO.md) ──────────
      # cpal's `asio` feature compiles C++ glue + bindgen against the Steinberg
      # ASIO SDK, so the Windows job needs the MSVC environment, libclang, and
      # the SDK. macOS skips all of this (no `asio` feature there).
      - name: Set up MSVC environment (Windows, for ASIO)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fetch ASIO SDK + set ASIO build env (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://download.steinberg.net/sdk_downloads/asiosdk_2.3.3_2019-06-14.zip"
          Invoke-WebRequest -Uri $url -OutFile asiosdk.zip
          Expand-Archive -Path asiosdk.zip -DestinationPath asiosdk -Force
          $sdk = (Get-ChildItem asiosdk -Directory | Select-Object -First 1).FullName
          echo "CPAL_ASIO_DIR=$sdk" >> $env:GITHUB_ENV
          # libclang ships with the LLVM that is preinstalled on the windows-latest
          # image; bindgen (used by asio-sys) needs LIBCLANG_PATH to find it.
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          Write-Host "ASIO SDK at $sdk"

      - name: Cache cargo (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch bundled ffmpeg/ffprobe sidecars
        run: node scripts/fetch-ffmpeg.mjs

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — REQUIRED for auto-update. Signs latest.json + the
          # per-platform artifacts with the keypair from
          # `npm run tauri signer generate` (pubkey is in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization. Reuses the existing Electron-era
          # secrets (Developer ID, team 784GN847G4) under tauri-action's names,
          # so nothing has to be re-entered. MAC_CERTS = base64 .p12,
          # APPLE_APP_SPECIFIC_PASSWORD = the notarization app password.
          APPLE_CERTIFICATE: ${{ secrets.MAC_CERTS }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Richard Fossland (784GN847G4)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SundayRec ${{ github.ref_name }}"
          releaseBody: |
            SundayRec — recording for church services (Tauri 2 rebuild).

            See the assets below to download and install. If a build is
            unsigned (pre-signing), on first launch:
            - macOS: right-click the app ▸ Open ▸ Open.
            - Windows: "More info" ▸ "Run anyway".
          releaseDraft: true
          prerelease: true
          # Generates latest.json (the updater feed) alongside the installers.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
