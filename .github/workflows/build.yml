name: Build & Release

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Tests: run on every push and PR ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── macOS: build, sign and notarize — only on version tags ──────────────
  build-mac:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build vendored grandiose (native NDI bindings + libndi runtime)
        run: bash scripts/build-grandiose.sh

      - name: Build whisper-cli (arm64 + x86_64)
        run: |
          # macos-latest runners are Apple Silicon; we cross-compile both
          # architectures so the .app bundles ship a usable binary for any Mac.
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp /tmp/whisper.cpp
          cd /tmp/whisper.cpp

          mkdir -p $GITHUB_WORKSPACE/resources/whisper/darwin-arm64
          mkdir -p $GITHUB_WORKSPACE/resources/whisper/darwin-x64

          # arm64 — native build with Metal
          cmake -B build-arm64 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm64 --config Release --target whisper-cli -j 4
          cp build-arm64/bin/whisper-cli $GITHUB_WORKSPACE/resources/whisper/darwin-arm64/whisper-cli
          chmod +x $GITHUB_WORKSPACE/resources/whisper/darwin-arm64/whisper-cli

          # x86_64 — cross-compile from arm64 runner; disable native CPU
          # detection and Metal (Intel Macs use Accelerate via BLAS instead).
          cmake -B build-x64 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_NATIVE=OFF -DGGML_METAL=OFF
          cmake --build build-x64 --config Release --target whisper-cli -j 4
          cp build-x64/bin/whisper-cli $GITHUB_WORKSPACE/resources/whisper/darwin-x64/whisper-cli
          chmod +x $GITHUB_WORKSPACE/resources/whisper/darwin-x64/whisper-cli

          file $GITHUB_WORKSPACE/resources/whisper/darwin-arm64/whisper-cli
          file $GITHUB_WORKSPACE/resources/whisper/darwin-x64/whisper-cli

      - name: Build, sign and notarize
        run: npx electron-vite build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # OAuth credentials baked into the build via electron-vite loadEnv.
          # Without these, the released app shows "OAuth-nøkkel er ikke satt".
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DROPBOX_APP_KEY:      ${{ secrets.DROPBOX_APP_KEY }}
          ONEDRIVE_CLIENT_ID:   ${{ secrets.ONEDRIVE_CLIENT_ID }}

      - name: Verify signature and notarization
        run: |
          DMG=$(find release -name "*.dmg" | grep -v arm64 | head -1)
          [ -z "$DMG" ] && echo "ERROR: No DMG found" && exit 1
          hdiutil attach "$DMG" -mountpoint /tmp/dmg_verify -nobrowse -quiet
          APP=$(find /tmp/dmg_verify -name "*.app" -maxdepth 1 | head -1)
          codesign --verify --deep --strict "$APP"
          spctl --assess --verbose "$APP"
          hdiutil detach /tmp/dmg_verify -quiet

  # ── Windows: build and publish — only on version tags ───────────────────
  build-win:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build vendored grandiose (native NDI bindings + libndi runtime)
        shell: bash
        run: bash scripts/build-grandiose.sh

      - name: Download whisper-cli binary (Windows x64)
        shell: pwsh
        run: |
          # Upstream ships a prebuilt CPU-only whisper-cli zip with all required DLLs
          $url = "https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.4/whisper-bin-x64.zip"
          $dest = "$env:RUNNER_TEMP/whisper-bin-x64.zip"
          $out  = "$env:GITHUB_WORKSPACE/resources/whisper/win32-x64"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dest
          Expand-Archive -Path $dest -DestinationPath $out -Force
          # The zip extracts a "Release" subfolder with whisper-cli.exe + dlls;
          # flatten it so resolveWhisperBin() finds whisper-cli.exe at the root.
          if (Test-Path "$out/Release/whisper-cli.exe") {
            Move-Item -Path "$out/Release/*" -Destination $out -Force
            Remove-Item -Recurse "$out/Release"
          }
          Get-ChildItem $out

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DROPBOX_APP_KEY:      ${{ secrets.DROPBOX_APP_KEY }}
          ONEDRIVE_CLIENT_ID:   ${{ secrets.ONEDRIVE_CLIENT_ID }}
