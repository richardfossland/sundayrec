name: Build & Release

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Tests: run on every push and PR ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── macOS: build, sign and notarize — only on version tags ──────────────
  build-mac:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, sign and notarize
        run: npx electron-vite build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # OAuth credentials baked into the build via electron-vite loadEnv.
          # Without these, the released app shows "OAuth-nøkkel er ikke satt".
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DROPBOX_APP_KEY:      ${{ secrets.DROPBOX_APP_KEY }}
          ONEDRIVE_CLIENT_ID:   ${{ secrets.ONEDRIVE_CLIENT_ID }}

      - name: Verify signature and notarization
        run: |
          DMG=$(find release -name "*.dmg" | grep -v arm64 | head -1)
          [ -z "$DMG" ] && echo "ERROR: No DMG found" && exit 1
          hdiutil attach "$DMG" -mountpoint /tmp/dmg_verify -nobrowse -quiet
          APP=$(find /tmp/dmg_verify -name "*.app" -maxdepth 1 | head -1)
          codesign --verify --deep --strict "$APP"
          spctl --assess --verbose "$APP"
          hdiutil detach /tmp/dmg_verify -quiet

  # ── Windows: build and publish — only on version tags ───────────────────
  build-win:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DROPBOX_APP_KEY:      ${{ secrets.DROPBOX_APP_KEY }}
          ONEDRIVE_CLIENT_ID:   ${{ secrets.ONEDRIVE_CLIENT_ID }}
